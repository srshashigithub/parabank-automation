# Cucumber JUnit Platform Engine configuration
# These settings apply when running via `mvn test` and IDE test runners.

cucumber.glue=com.parabank.hooks,com.parabank.stepdefs
cucumber.features=classpath:features
cucumber.plugin=pretty,\
  html:target/cucumber-reports/cucumber.html,\
  json:target/cucumber-reports/cucumber.json,\
  timeline:target/cucumber-reports/timeline

# Set to 'true' to suppress the Cucumber publish report prompt
cucumber.publish.quiet=true
